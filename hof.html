<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUESTBOOK | OWL BUTLER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #181818;
      --border: #2a2a2a;
      --accent: #f7931a;
      --text: #e8e8e8;
      --text2: #999;
      --text3: #555;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Noto Sans KR', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
      pointer-events: none;
      z-index: 9999;
    }

    /* HEADER */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 64px;
      gap: 16px;
      position: relative;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
      position: absolute;
      left: 0;
    }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-top { font-family: var(--mono); font-weight: 700; font-size: 13px; color: var(--text); letter-spacing: 0.1em; line-height: 1.3; }
    .logo-bot { font-family: var(--mono); font-weight: 700; font-size: 11px; color: var(--accent); letter-spacing: 0.1em; line-height: 1.3; }

    /* NAV */
    nav { display: flex; align-items: center; gap: 2px; }
    nav a {
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--text2);
      text-decoration: none;
      padding: 6px 10px;
      letter-spacing: 0.06em;
      border: 1px solid transparent;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    nav a:hover, nav a.active {
      color: var(--accent);
      border-color: transparent;
      border-bottom-color: var(--accent);
      background: rgba(247,147,26,0.05);
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      background: none;
      border: none;
    }
    .hamburger span { display: block; width: 22px; height: 2px; background: var(--text2); transition: all 0.3s; }
    .mobile-nav { display: none; background: var(--bg2); border-top: 1px solid var(--border); padding: 12px 0; }
    .mobile-nav a {
      display: block;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text2);
      text-decoration: none;
      padding: 10px 24px;
      letter-spacing: 0.08em;
      border-left: 2px solid transparent;
      transition: all 0.2s;
    }
    .mobile-nav a:hover, .mobile-nav a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(247,147,26,0.06); }
    .mobile-nav.open { display: block; }

    @media (max-width: 768px) {
      nav { display: none; }
      .hamburger { display: flex; position: absolute; right: 0; }
    }

    /* PAGE LAYOUT */
    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 24px 100px;
    }

    /* PAGE HEADER */
    .page-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.25em;
      margin-bottom: 10px;
    }
    .page-title {
      font-family: var(--mono);
      font-size: clamp(22px, 4vw, 32px);
      color: var(--text);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .page-title span { color: var(--accent); }
    .page-desc {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text3);
      letter-spacing: 0.08em;
      margin-bottom: 48px;
      line-height: 1.8;
    }
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin-bottom: 48px;
    }

    /* FORM */
    .form-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 28px 28px 32px;
      margin-bottom: 40px;
      position: relative;
    }
    .form-wrap::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .form-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.2em;
      margin-bottom: 20px;
    }
    .form-row { margin-bottom: 16px; }
    .form-row label {
      display: block;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.12em;
      margin-bottom: 7px;
    }
    .form-row input,
    .form-row textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      letter-spacing: 0.04em;
    }
    .form-row input:focus,
    .form-row textarea:focus { border-color: rgba(247,147,26,0.5); }
    .form-row textarea { height: 90px; }
    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      gap: 12px;
    }
    .char-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
    }
    .btn-submit {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--bg);
      background: var(--accent);
      border: none;
      padding: 10px 24px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-submit:hover:not(:disabled) { opacity: 0.85; }
    .btn-submit:active:not(:disabled) { transform: scale(0.97); }
    .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
    .form-msg {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      margin-top: 12px;
      min-height: 16px;
      color: var(--accent);
    }
    .form-msg.error { color: #e05c5c; }

    /* ENTRIES */
    .entries-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .entries-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.2em;
    }
    .entries-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }
    .entry {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 20px 22px;
      margin-bottom: 8px;
      position: relative;
      transition: border-color 0.2s;
    }
    .entry:hover { border-color: rgba(247,147,26,0.2); }
    .entry-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .entry-name {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.08em;
    }
    .entry-time {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.06em;
    }
    .entry-msg {
      font-family: var(--sans);
      font-size: 13.5px;
      color: var(--text2);
      line-height: 1.7;
      word-break: break-word;
    }
    .entry-index {
      position: absolute;
      top: 20px; right: 18px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
    }
    .empty {
      text-align: center;
      padding: 60px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text3);
      letter-spacing: 0.15em;
      border: 1px dashed var(--border);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .loading {
      text-align: center;
      padding: 40px 0;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.15em;
    }
    .loading span { animation: blink 1.2s infinite; }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 24px; }
    .footer-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 12px; }
    .footer-logo { font-family: var(--mono); font-size: 12px; color: var(--text3); letter-spacing: 0.15em; }
    .footer-logo span { color: var(--accent); }
    .footer-note { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">
        <div class="logo-text">
          <span class="logo-top">OWL BUTLER</span>
          <span class="logo-bot">THE B SOCIETY</span>
        </div>
      </a>
      <nav>
        <a href="index.html">HOME</a>
        <a href="bscard.html">BS CARD</a>
        <a href="hof.html" class="active">HOF</a>
        <a href="#">OWL BUTLER</a>
        <a href="#">THE B SOCIETY</a>
        <a href="#">COLDCARD Q</a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="메뉴">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <a href="index.html">HOME</a>
      <a href="bscard.html">BS CARD</a>
      <a href="hof.html" class="active">HOF</a>
      <a href="#">OWL BUTLER</a>
      <a href="#">THE B SOCIETY</a>
      <a href="#">COLDCARD Q</a>
    </div>
  </header>

  <div class="page">
    <div class="page-label">// GUESTBOOK</div>
    <h1 class="page-title">LEAVE A <span>MESSAGE</span></h1>
    <p class="page-desc">방문하신 모든 분들의 흔적을 여기에 남겨주세요.</p>
    <div class="divider"></div>

    <div class="form-wrap">
      <div class="form-label">// NEW ENTRY</div>
      <div class="form-row">
        <label>NAME / HANDLE</label>
        <input type="text" id="inputName" maxlength="30" placeholder="Anonymous" autocomplete="off" />
      </div>
      <div class="form-row">
        <label>MESSAGE</label>
        <textarea id="inputMsg" maxlength="300" placeholder="메시지를 남겨주세요..."></textarea>
      </div>
      <div class="form-footer">
        <span class="char-count" id="charCount">0 / 300</span>
        <button class="btn-submit" id="btnSubmit">SUBMIT →</button>
      </div>
      <div class="form-msg" id="formMsg"></div>
    </div>

    <div class="entries-header">
      <span class="entries-label">// MESSAGES</span>
      <span class="entries-count" id="entriesCount"></span>
    </div>
    <div id="entriesList">
      <div class="loading"><span>LOADING...</span></div>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo">OWL BUTLER <span>|</span> THE B SOCIETY</div>
      <div class="footer-note">// BITCOIN · COLD STORAGE · EST. 2024</div>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDVV1xvAGMvruyGRhSUK7kMRRNVeZs6HVk",
      authDomain: "owlbutler.firebaseapp.com",
      projectId: "owlbutler",
      storageBucket: "owlbutler.firebasestorage.app",
      messagingSenderId: "855237503888",
      appId: "1:855237503888:web:46d78149d540bb5fc06115"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const inputName = document.getElementById('inputName');
    const inputMsg = document.getElementById('inputMsg');
    const btnSubmit = document.getElementById('btnSubmit');
    const formMsg = document.getElementById('formMsg');
    const charCount = document.getElementById('charCount');
    const entriesList = document.getElementById('entriesList');
    const entriesCount = document.getElementById('entriesCount');

    inputMsg.addEventListener('input', () => {
      charCount.textContent = `${inputMsg.value.length} / 300`;
    });

    btnSubmit.addEventListener('click', async () => {
      const name = inputName.value.trim() || 'Anonymous';
      const msg = inputMsg.value.trim();

      if (!msg) {
        showMsg('메시지를 입력해주세요.', true);
        inputMsg.focus();
        return;
      }

      btnSubmit.disabled = true;
      showMsg('');

      try {
        await addDoc(collection(db, 'guestbook'), {
          name,
          message: msg,
          createdAt: serverTimestamp()
        });
        inputMsg.value = '';
        charCount.textContent = '0 / 300';
        showMsg('// MESSAGE SENT.');
        setTimeout(() => showMsg(''), 3000);
      } catch (e) {
        showMsg('오류가 발생했습니다. 다시 시도해주세요.', true);
        console.error(e);
      } finally {
        btnSubmit.disabled = false;
      }
    });

    function showMsg(text, isError = false) {
      formMsg.textContent = text;
      formMsg.className = 'form-msg' + (isError ? ' error' : '');
    }

    const q = query(collection(db, 'guestbook'), orderBy('createdAt', 'desc'));

    onSnapshot(q, (snapshot) => {
      const docs = snapshot.docs;
      entriesCount.textContent = `${docs.length} ENTRIES`;

      if (docs.length === 0) {
        entriesList.innerHTML = '<div class="empty">// NO MESSAGES YET.<br>첫 번째 메시지를 남겨주세요.</div>';
        return;
      }

      entriesList.innerHTML = '';
      docs.forEach((doc, i) => {
        const data = doc.data();
        const date = data.createdAt?.toDate?.() ?? new Date();

        const el = document.createElement('div');
        el.className = 'entry';

        const meta = document.createElement('div');
        meta.className = 'entry-meta';

        const nameEl = document.createElement('span');
        nameEl.className = 'entry-name';
        nameEl.textContent = data.name;

        const timeEl = document.createElement('span');
        timeEl.className = 'entry-time';
        timeEl.textContent = formatDate(date);

        meta.appendChild(nameEl);
        meta.appendChild(timeEl);

        const msgEl = document.createElement('div');
        msgEl.className = 'entry-msg';
        msgEl.textContent = data.message;

        const indexEl = document.createElement('span');
        indexEl.className = 'entry-index';
        indexEl.textContent = `#${String(docs.length - i).padStart(3, '0')}`;

        el.appendChild(meta);
        el.appendChild(msgEl);
        el.appendChild(indexEl);
        entriesList.appendChild(el);
      });
    }, (err) => {
      entriesList.innerHTML = '<div class="empty">// 데이터를 불러올 수 없습니다.</div>';
      console.error(err);
    });

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      const h = String(date.getHours()).padStart(2, '0');
      const min = String(date.getMinutes()).padStart(2, '0');
      return `${y}.${m}.${d} ${h}:${min}`;
    }

    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('mobileNav').classList.toggle('open');
    });
  </script>
</body>
</html>
