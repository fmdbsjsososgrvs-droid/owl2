  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OWL BUTLER | THE B SOCIETY</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Parisienne&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --border: #2a2a2a;
      --accent: #f7931a;
      --text: #e8e8e8;
      --text2: #999;
      --text3: #444;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Noto Sans KR', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* 배경 그리드 패턴 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(247,147,26,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(247,147,26,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* 중앙 glow */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(247,147,26,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px;
      width: 100%;
      max-width: 750px;
      text-align: center;
      gap: 0;
    }

    /* 상단 라벨 */
    .top-label {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--text3);
      letter-spacing: 0.3em;
      margin-bottom: 27px;
    }

    /* 카드 이미지 */
    .card-wrap {
      position: relative;
      width: 390px;
      margin-bottom: 40px;
    }
    .card-wrap::before {
      content: '';
      position: absolute;
      inset: -12px;
      background: radial-gradient(ellipse, rgba(247,147,26,0.18) 0%, transparent 70%);
      border-radius: 18px;
      z-index: -1;
    }
    .card-img {
      width: 100%;
      border-radius: 12px;
      display: block;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(247,147,26,0.15);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .card-img:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 30px 70px rgba(0,0,0,0.8), 0 0 30px rgba(247,147,26,0.2);
    }

    /* 타이틀 */
    .title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
      line-height: 1;
    }
    .title-kr {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 54px;
      color: #ffffff;
      letter-spacing: 0.04em;
    }
    .title-en {
      font-family: 'Parisienne', cursive;
      font-size: 27px;
      color: var(--accent);
      letter-spacing: 0.02em;
    }

    /* 서브타이틀 */
    .subtitle {
      font-family: var(--mono);
      font-size: 16px;
      color: var(--accent);
      letter-spacing: 0.12em;
      margin-bottom: 72px;
      opacity: 0.85;
    }
    .subtitle .plus {
      color: var(--accent);
      margin: 0 6px;
    }

    /* 구분선 */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(247,147,26,0.3), transparent);
    }
    .divider-icon {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.1em;
      opacity: 0.6;
    }

    /* 버튼 그룹 */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 100%;
      max-width: 420px;
    }
    .lang-btn {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.25em;
      color: var(--text2);
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
      transition: color 0.2s;
      overflow: hidden;
    }
    .lang-btn:first-child { border-top: 1px solid var(--border); }
    .lang-btn .btn-num {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.15em;
      margin-right: 20px;
      min-width: 24px;
      transition: color 0.2s;
    }
    .lang-btn .btn-label {
      flex: 1;
      transition: color 0.2s, letter-spacing 0.2s;
    }
    .lang-btn .btn-arrow {
      font-size: 14px;
      color: var(--text3);
      opacity: 0;
      transform: translate(-6px, 6px);
      transition: all 0.2s ease;
    }
    .lang-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.2s ease;
    }
    .lang-btn:hover { color: var(--accent); }
    .lang-btn:hover .btn-num { color: var(--accent); }
    .lang-btn:hover .btn-label { letter-spacing: 0.32em; }
    .lang-btn:hover .btn-arrow { color: var(--accent); opacity: 1; transform: translate(0,0); }
    .lang-btn:hover::before { transform: scaleY(1); }
    /* 하단 */
    .bottom-label {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--text3);
      letter-spacing: 0.2em;
      margin-top: 72px;
    }

    /* footer */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .footer-logo {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      letter-spacing: 0.1em;
    }
    .footer-logo span { color: var(--accent); }
    .footer-note {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
    }

    @media (max-width: 480px) {
      .card-wrap { width: 220px; }
      .title-kr { font-size: 30px; }
      .lang-btn { padding: 11px 26px; }
    }
  </style>
</head>
